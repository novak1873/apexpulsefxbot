name: Azure Node.js CI/CD with ApexPulseFXbot

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
  repository_dispatch:
    types: [ deploy_from_bot ]

env:
  AZURE_WEBAPP_NAME: apexpulsefx-webapp       # your Azure Web App name
  AZURE_WEBAPP_PACKAGE_PATH: '.'              # path to your Node.js app
  NODE_VERSION: '20.x'
  TELEGRAM_BOT_TOKEN: ${{ secrets.APEX_BOT_TOKEN }}   # ApexPulseFXbot token
  TELEGRAM_CHAT_ID: ${{ secrets.APEX_CHAT_ID }}       # Telegram chat ID

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies, build, and test
        run: |
          npm install
          npm run build --if-present
          npm run test --if-present

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Development'
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}

      - name: Notify ApexPulseFXbot on success
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ env.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ env.TELEGRAM_CHAT_ID }}" \
            -d text="✅ Deployment successful for ${{ env.AZURE_WEBAPP_NAME }}."

      - name: Notify ApexPulseFXbot on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ env.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ env.TELEGRAM_CHAT_ID }}" \
            -d text="❌ Deployment FAILED for ${{ env.AZURE_WEBAPP_NAME }}."
concurrency:
  
