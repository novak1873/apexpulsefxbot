const TelegramBot = require('node-telegram-bot-api');
const express = require('express');

const BOT_TOKEN = '7798611667:AAELC-l9KlM0rBWfPcyHWrngXoRKdyELrm';

const CHAT_IDS = [
  2146088284,
  6889674513
];

const bot = new TelegramBot(BOT_TOKEN, { polling: true });

const app = express();
app.use(express.json());

/*
Investor notification endpoint
Your website calls this when someone invests
*/

app.post('/new-investor', async (req, res) => {

  const { investor, amount, asset } = req.body;

  const message = `
💰 ApexPulseFX Investment Alert

Investor: ${investor}
Asset: ${asset}
Amount: ${amount}

Thanks for investing in the crypto market with ApexPulseFX 🚀
`;

  for (const chatId of CHAT_IDS) {
    await bot.sendMessage(chatId, message);
  }

  res.json({ status: "message sent" });

});


/* Telegram Commands */

bot.onText(/\/start/, (msg) => {

  bot.sendMessage(msg.chat.id,
`🚀 Welcome to ApexPulseFX Bot

