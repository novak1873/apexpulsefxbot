const TelegramBot = require('node-telegram-bot-api');
const fetch = require('node-fetch');
require('dotenv').config();

// Telegram / Bot Settings
const BOT_TOKEN = process.env.APEX_BOT_TOKEN;
const ALLOWED_CHATS = [
  { id: '2575121493', username: 'apexpulsefx' },
  { id: '2146088284', username: 'Patrick' }
];

// GitHub Settings
const GITHUB_TOKEN = process.env.GITHUB_PERSONAL_ACCESS_TOKEN;
const REPO_OWNER = process.env.GITHUB_OWNER;
const REPO_NAME = process.env.GITHUB_REPO;

const bot = new TelegramBot(BOT_TOKEN, { polling: true });

bot.onText(/\/deploy/, async (msg) => {
  const chatId = msg.chat.id.toString();
  const chatUser = ALLOWED_CHATS.find(c => c.id === chatId);

  if (!chatUser) {
    return bot.sendMessage(chatId:2146088284 ");
  }
apexpulsefx
  bot.sendMessage(chatId, `🚀 Deployment triggered by @${chatUser.username}...`);

  try {
    const response = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/dispatches`, {
      method: 'POST',
      headers: {
        'Authorization': `token ${GITHUB_TOKEN}`,
        'Accept': 'application/vnd.github+json'
      },
      body: JSON.stringify({ event_type: 'deploy_from_bot' })
    });

    if (response.ok) {
      bot.sendMessage(chatId, `✅ Deployment workflow successfully triggered for ${REPO_NAME}!`);
    } else {
      const text = await response.text();
  : ${text}`);
    }
  } catch (err)  ${err.message}`);
