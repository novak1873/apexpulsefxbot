const TelegramBot = require('node-telegram-bot-api');
const fetch = require('node-fetch'); // or built-in fetch if using Node 18+

// Your ApexPulseFXbot token
const BOT_TOKEN = '7798611667:AAELC-l9KlM0rBWfPcyHWrngXoRKdyELrm';
const CHAT_ID = '2146088284'; // your Telegram chat ID

// GitHub info
const GITHUB_TOKEN = '<YOUR_GITHUB_PERSONAL_ACCESS_TOKEN>'; // repo access token
const REPO_OWNER = '<your-github-username>';
const REPO_NAME = '<your-repo-name>';

const bot = new TelegramBot(BOT_TOKEN, { polling: true });

bot.onText(/\/deploy/, async (msg) => {
  const chatId = msg.chat.id;

  if (chatId.toString() !== CHAT_ID) {
    return; // Only allow your chat
  }

  bot.sendMessage(chatId, "🚀 Deployment triggered via ApexPulseFXbot...");

  try {
    const response = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/dispatches`, {
      method: 'POST',
      headers: {
        'Authorization': `token ${GITHUB_TOKEN}`,
        'Accept': 'application/vnd.github+json'
      },
      body: JSON.stringify({
        event_type: 'deploy_from_bot'
      })
    });

    if (response.ok) {
      bot.sendMessage(chatId, "✅ Deployment workflow successfully triggered!");
    } else {
      const text = await response.text();
      bot.sendMessage(chatId, `❌ Failed to trigger workflow: ${text}`);
    }
  } catch (err) {
    bot.sendMessage(chatId, `❌ Error: ${err.message}`);
  }
});
